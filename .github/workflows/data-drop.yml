name: IOWN Data Drop

on:
  schedule:
    # 5:00 AM CT (10:00 UTC) - Morning Brief (buffer for CDT + GitHub delay)
    - cron: '0 10 * * 1-5'
    # 4:15 PM CT (21:15 UTC) - Market Commentary
    - cron: '15 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch market data
        env:
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
        run: node scripts/data-drop.js

      - name: Commit and push
        run: |
          git config user.name "IOWN Data Bot"
          git config user.email "bot@iown.dev"
          git add latest-drop.txt
          git diff --cached --quiet || git commit -m "Data Drop $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
