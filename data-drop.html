<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IOWN Data Drop</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gd: #3D4A2E; --gm: #5B7A3D; --gl: #7A8F5A; --gb: #F4F7F0;
    --ink: #1A1A1A; --accent: #8B3A3A; --mgray: #8A8A84; --lrule: #BCBCB4; --cream: #FAFAF5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'EB Garamond', Georgia, serif; background: var(--gb); color: var(--ink); min-height: 100vh; }
  .shell { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
  .masthead {
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 0.75rem; border-bottom: 3px solid var(--ink); margin-bottom: 0.25rem;
  }
  .masthead h1 { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 1.75rem; letter-spacing: 0.04em; color: var(--gd); text-transform: uppercase; }
  .masthead .tag { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: white; background: var(--gm); padding: 0.2rem 0.6rem; border-radius: 2px; letter-spacing: 0.05em; text-transform: uppercase; }
  .masthead-sub { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--mgray); letter-spacing: 0.08em; text-transform: uppercase; padding-top: 0.4rem; border-top: 1px solid var(--ink); margin-bottom: 2rem; }
  .key-section { background: white; border: 1px solid var(--lrule); padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; }
  .key-section label { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--mgray); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 0.5rem; }
  .key-row { display: flex; gap: 0.75rem; align-items: center; }
  .key-row input { flex: 1; font-family: 'DM Mono', monospace; font-size: 0.85rem; padding: 0.5rem 0.75rem; border: 1px solid var(--lrule); background: var(--cream); color: var(--ink); outline: none; transition: border 0.2s; }
  .key-row input:focus { border-color: var(--gm); }
  .key-row input.saved { border-color: var(--gm); background: var(--gb); }
  .key-status { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--gm); margin-top: 0.35rem; }
  .key-status.none { color: var(--accent); }
  .actions { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  button { font-family: 'DM Mono', monospace; font-size: 0.8rem; letter-spacing: 0.04em; padding: 0.6rem 1.4rem; border: none; cursor: pointer; transition: all 0.15s; text-transform: uppercase; }
  .btn-primary { background: var(--gd); color: white; }
  .btn-primary:hover { background: var(--gm); }
  .btn-primary:disabled { background: var(--mgray); cursor: not-allowed; }
  .btn-secondary { background: transparent; color: var(--gd); border: 1px solid var(--gd); }
  .btn-secondary:hover { background: var(--gd); color: white; }
  .btn-accent { background: var(--accent); color: white; }
  .btn-accent:hover { opacity: 0.85; }
  .progress-bar { height: 3px; background: var(--lrule); margin-bottom: 0.5rem; overflow: hidden; display: none; }
  .progress-bar.active { display: block; }
  .progress-fill { height: 100%; background: var(--gm); width: 0%; transition: width 0.3s ease; }
  .status-log { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--mgray); margin-bottom: 0.5rem; min-height: 1rem; }
  .ticker-progress { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--gl); margin-bottom: 1rem; line-height: 1.5; display: none; word-break: break-all; }
  .ticker-progress.active { display: block; }
  .tp-done { color: var(--gm); }
  .tp-fail { color: var(--accent); }
  .tp-wait { color: var(--lrule); }
  .output-wrap { display: none; margin-top: 1rem; }
  .output-wrap.visible { display: block; }
  .output-label { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--mgray); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.5rem; }
  .output-box { background: var(--ink); color: #C8D4B8; font-family: 'DM Mono', monospace; font-size: 0.72rem; line-height: 1.55; padding: 1.25rem 1.5rem; white-space: pre-wrap; word-break: break-word; max-height: 70vh; overflow-y: auto; border-left: 3px solid var(--gm); }
  .output-box::selection { background: var(--gm); color: white; }
  .copied-toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--gd); color: white; font-family: 'DM Mono', monospace; font-size: 0.8rem; padding: 0.6rem 1.5rem; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 100; }
  .copied-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .dashboard { display: none; margin-bottom: 1.5rem; }
  .dashboard.visible { display: block; }
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.5rem; margin-bottom: 1rem; }
  .card { background: white; border: 1px solid var(--lrule); padding: 0.6rem 0.75rem; }
  .card-label { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--mgray); text-transform: uppercase; letter-spacing: 0.04em; }
  .card-value { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: var(--ink); margin-top: 0.1rem; }
  .card-change { font-family: 'DM Mono', monospace; font-size: 0.7rem; margin-top: 0.1rem; }
  .up { color: var(--gm); } .down { color: var(--accent); } .flat { color: var(--mgray); }
  .section-title { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--gd); text-transform: uppercase; letter-spacing: 0.08em; padding-bottom: 0.3rem; border-bottom: 1px solid var(--lrule); margin-bottom: 0.5rem; margin-top: 1rem; }
  .foot { margin-top: 2.5rem; padding-top: 0.75rem; border-top: 1px solid var(--lrule); font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--mgray); text-align: center; letter-spacing: 0.05em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="shell">
  <div class="masthead">
    <h1>IOWN Data Drop</h1>
    <span class="tag">Morning Brief Fuel</span>
  </div>
  <div class="masthead-sub">Intentional Ownership · Paradiem · 51 Holdings + Crypto + Commodities + Sentiment</div>

  <div class="key-section">
    <label>Finnhub API Key (stored locally — enter once)</label>
    <div class="key-row">
      <input type="password" id="apiKey" placeholder="Paste your Finnhub key here..." />
      <button class="btn-secondary" onclick="saveKey()">Save</button>
      <button class="btn-secondary" onclick="toggleKeyVis()" id="toggleBtn">Show</button>
    </div>
    <div class="key-status none" id="keyStatus">No key saved</div>
  </div>

  <div class="actions">
    <button class="btn-primary" id="fetchBtn" onclick="fetchAll()" disabled>Fetch All Data</button>
    <button class="btn-accent" id="copyBtn" onclick="copyOutput()" style="display:none">Copy Data Drop</button>
  </div>

  <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="status-log" id="statusLog"></div>
  <div class="ticker-progress" id="tickerProgress"></div>
  <div class="dashboard" id="dashboard"></div>
  <div class="output-wrap" id="outputWrap">
    <div class="output-label">Formatted Data Drop — Copy & Paste into Claude</div>
    <div class="output-box" id="outputBox"></div>
  </div>
  <div class="foot">Confidential · IOWN · RIA · Paradiem</div>
</div>
<div class="copied-toast" id="toast">Copied to clipboard</div>

<script>
const DIVIDEND = ['ABT','A','ADI','ATO','ADP','BKH','CAT','CHD','CL','FAST','GD','GPC','LRCX','LMT','MATX','NEE','ORI','PCAR','QCOM','DGX','SSNC','STLD','SYK','TEL','VLO'];
const GROWTH = ['AMD','AEM','ATAT','CVX','CWAN','CNX','COIN','EIX','FINV','FTNT','GFI','SUPV','HRMY','HUT','KEYS','MARA','NVDA','NXPI','OKE','PDD','HOOD','SYF','TSM','TOL'];
const DIGITAL_ETFS = ['IBIT','ETHA'];
const BENCHMARKS = ['DVY','IWS','IUSG'];
const INDEX_PROXIES = ['SPY','DIA','QQQ','IWM'];
const SECTOR_ETFS = ['XLE','XLK','XLF','XLV','XLI','XLB','XLU','XLRE','XLC','XLP','XLY'];
const COMMODITY_PROXIES = ['GLD','SLV','USO','UNG','BNO'];
const RATE_PROXIES = ['TLT'];
const VIX_TICKER = ['UVXY'];

const ALL_TICKERS = [...INDEX_PROXIES, ...VIX_TICKER, ...RATE_PROXIES, ...SECTOR_ETFS, ...COMMODITY_PROXIES, ...DIVIDEND, ...GROWTH, ...DIGITAL_ETFS, ...BENCHMARKS];

const SECTOR_NAMES = { XLE:'Energy', XLK:'Tech', XLF:'Financials', XLV:'Healthcare', XLI:'Industrials', XLB:'Materials', XLU:'Utilities', XLRE:'Real Estate', XLC:'Comm Svcs', XLP:'Staples', XLY:'Discret.' };
const INDEX_NAMES = { SPY:'S&P 500', DIA:'Dow', QQQ:'Nasdaq', IWM:'Russell 2K' };
const COMMODITY_NAMES = { GLD:'Gold', SLV:'Silver', USO:'WTI Oil', UNG:'Nat Gas', BNO:'Brent Oil' };

// Key management
const keyInput = document.getElementById('apiKey');
const keyStatus = document.getElementById('keyStatus');
const fetchBtn = document.getElementById('fetchBtn');

function loadKey() {
  const k = localStorage.getItem('iown_finnhub_key');
  if (k) { keyInput.value = k; keyInput.classList.add('saved'); keyStatus.textContent = 'Key saved ✓'; keyStatus.classList.remove('none'); fetchBtn.disabled = false; }
}
function saveKey() {
  const k = keyInput.value.trim(); if (!k) return;
  localStorage.setItem('iown_finnhub_key', k);
  keyInput.classList.add('saved'); keyStatus.textContent = 'Key saved ✓'; keyStatus.classList.remove('none'); fetchBtn.disabled = false;
}
function toggleKeyVis() {
  const btn = document.getElementById('toggleBtn');
  if (keyInput.type === 'password') { keyInput.type = 'text'; btn.textContent = 'Hide'; }
  else { keyInput.type = 'password'; btn.textContent = 'Show'; }
}

// UI
function setProgress(p) { document.getElementById('progressBar').classList.add('active'); document.getElementById('progressFill').style.width = p + '%'; }
function log(m) { document.getElementById('statusLog').textContent = m; }
function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

// Finnhub: /api/v1/quote?symbol=X&token=KEY
// Returns: { c: current, d: change, dp: change%, h: high, l: low, o: open, pc: prevClose, t: timestamp }
// Free tier: 60 calls/minute
async function fhQuote(sym) {
  const key = localStorage.getItem('iown_finnhub_key');
  const url = `https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(sym)}&token=${key}`;
  try {
    const res = await fetch(url);
    if (res.status === 429) { await wait(3000); const r2 = await fetch(url); if (!r2.ok) return null; return r2.json(); }
    if (!res.ok) return null;
    return res.json();
  } catch(e) { return null; }
}

async function fetchAllQuotes(tickers) {
  const results = {};
  const tp = document.getElementById('tickerProgress');
  tp.classList.add('active');
  const ok = [], fail = [];

  for (let i = 0; i < tickers.length; i++) {
    const sym = tickers[i];
    setProgress(Math.round(5 + (i / tickers.length) * 70));
    log(`Fetching ${i + 1}/${tickers.length}: ${sym}`);

    const data = await fhQuote(sym);
    if (data && data.c > 0) {
      results[sym] = { symbol: sym, price: data.c, change: data.d, changesPercentage: data.dp, dayHigh: data.h, dayLow: data.l, open: data.o, previousClose: data.pc };
      ok.push(sym);
    } else {
      fail.push(sym);
    }

    // Live ticker display
    tp.innerHTML = tickers.map((t, idx) => {
      if (idx > i) return `<span class="tp-wait">${t}</span>`;
      return `<span class="${ok.includes(t) ? 'tp-done' : 'tp-fail'}">${t}</span>`;
    }).join(' · ');

    // Pace: ~55/min safe margin
    if (i < tickers.length - 1) await wait(1100);
  }
  return { results, ok, fail };
}

let DATA = {};

async function fetchAll() {
  fetchBtn.disabled = true;
  document.getElementById('copyBtn').style.display = 'none';
  document.getElementById('outputWrap').classList.remove('visible');
  document.getElementById('dashboard').classList.remove('visible');
  document.getElementById('tickerProgress').classList.remove('active');
  DATA = { quotes: {} };
  const t0 = Date.now();

  try {
    // 1) Equity quotes
    const { results, ok, fail } = await fetchAllQuotes(ALL_TICKERS);
    DATA.quotes = results;
    setProgress(78);

    // 2) Crypto
    log('Fetching crypto...');
    try {
      const c = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=bitcoin,ethereum&order=market_cap_desc&per_page=2&page=1&sparkline=false&price_change_percentage=24h,7d').then(r => r.json());
      DATA.crypto = {}; c.forEach(x => DATA.crypto[x.id] = x);
    } catch(e) { DATA.crypto = {}; }
    setProgress(84);

    // 3) Crypto global
    try { const g = await fetch('https://api.coingecko.com/api/v3/global').then(r => r.json()); DATA.cryptoGlobal = g.data || {}; }
    catch(e) { DATA.cryptoGlobal = {}; }
    setProgress(89);

    // 4) Fear & Greed
    log('Fetching sentiment...');
    try { const f = await fetch('https://api.alternative.me/fng/?limit=1').then(r => r.json()); DATA.fearGreed = f.data ? f.data[0] : null; }
    catch(e) { DATA.fearGreed = null; }
    setProgress(94);

    // 5) News
    log('Fetching headlines...');
    try {
      const key = localStorage.getItem('iown_finnhub_key');
      const n = await fetch(`https://finnhub.io/api/v1/news?category=general&token=${key}`).then(r => r.json());
      DATA.news = (n || []).slice(0, 8);
    } catch(e) { DATA.news = []; }
    setProgress(97);

    buildOutput(); buildDashboard(); setProgress(100);
    const sec = ((Date.now() - t0) / 1000).toFixed(0);
    let msg = `Done ✓ — ${new Date().toLocaleTimeString()} | ${ok.length}/${ALL_TICKERS.length} tickers | ${sec}s`;
    if (fail.length) msg += ` | Missing: ${fail.join(', ')}`;
    log(msg);
  } catch(err) { log('ERROR: ' + err.message); console.error(err); }
  fetchBtn.disabled = false;
}

// Format helpers
function fmt(n, d=2) { if (n==null||isNaN(n)) return '—'; return Number(n).toFixed(d); }
function pct(n) { if (n==null||isNaN(n)) return '—'; return (n>=0?'+':'')+Number(n).toFixed(2)+'%'; }
function price(n) { if (n==null||isNaN(n)) return '—'; if (n>=1000) return '$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); return '$'+fmt(n); }

function buildOutput() {
  const Q = DATA.quotes;
  const now = new Date();
  const ds = now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
  const ts = now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  let o = `=== IOWN DATA DROP | ${ds} | ${ts} ===\n\n`;

  o += '── INDICES ──\n';
  INDEX_PROXIES.forEach(s => { const q=Q[s]; if(q) o+=`${INDEX_NAMES[s]}: ${price(q.price)} (${pct(q.changesPercentage)}) | O:${price(q.open)} H:${price(q.dayHigh)} L:${price(q.dayLow)} PC:${price(q.previousClose)}\n`; });
  const vix=Q['UVXY']; if(vix) o+=`UVXY (VIX proxy): ${price(vix.price)} (${pct(vix.changesPercentage)})\n`;
  o += '\n── RATES ──\n';
  const tlt=Q['TLT']; if(tlt) o+=`TLT (20Y Bond): ${price(tlt.price)} (${pct(tlt.changesPercentage)}) PC:${price(tlt.previousClose)}\n`;

  o += '\n── SECTORS ──\n';
  SECTOR_ETFS.map(s=>({s,q:Q[s]})).filter(x=>x.q).sort((a,b)=>(b.q.changesPercentage||0)-(a.q.changesPercentage||0)).forEach(({s,q})=>{ o+=`${SECTOR_NAMES[s]} (${s}): ${pct(q.changesPercentage)} | ${price(q.price)}\n`; });

  o += '\n── COMMODITIES ──\n';
  COMMODITY_PROXIES.forEach(s=>{ const q=Q[s]; if(q) o+=`${COMMODITY_NAMES[s]} (${s}): ${price(q.price)} (${pct(q.changesPercentage)})\n`; });

  o += '\n── CRYPTO ──\n';
  const btc=DATA.crypto.bitcoin, eth=DATA.crypto.ethereum;
  if(btc) o+=`BTC: ${price(btc.current_price)} | 24h: ${pct(btc.price_change_percentage_24h)} | 7d: ${pct(btc.price_change_percentage_7d_in_currency)} | MCap: $${fmt(btc.market_cap/1e9,1)}B\n`;
  if(eth) o+=`ETH: ${price(eth.current_price)} | 24h: ${pct(eth.price_change_percentage_24h)} | 7d: ${pct(eth.price_change_percentage_7d_in_currency)} | MCap: $${fmt(eth.market_cap/1e9,1)}B\n`;
  if(DATA.cryptoGlobal.market_cap_percentage){ o+=`BTC Dom: ${fmt(DATA.cryptoGlobal.market_cap_percentage.btc,1)}% | Total MCap: $${fmt(DATA.cryptoGlobal.total_market_cap?.usd/1e12,2)}T\n`; }
  DIGITAL_ETFS.forEach(s=>{ const q=Q[s]; if(q) o+=`${s}: ${price(q.price)} (${pct(q.changesPercentage)})\n`; });

  o += '\n── SENTIMENT ──\n';
  if(DATA.fearGreed) o+=`Fear & Greed: ${DATA.fearGreed.value} (${DATA.fearGreed.value_classification})\n`;

  o += '\n── DIVIDEND STRATEGY (25) ──\n';
  DIVIDEND.forEach(s=>{ const q=Q[s]; o += q ? `${s}: ${price(q.price)} (${pct(q.changesPercentage)}) O:${price(q.open)} H:${price(q.dayHigh)} L:${price(q.dayLow)} PC:${price(q.previousClose)}\n` : `${s}: — (no data)\n`; });

  o += '\n── GROWTH HYBRID (24) ──\n';
  GROWTH.forEach(s=>{ const q=Q[s]; o += q ? `${s}: ${price(q.price)} (${pct(q.changesPercentage)}) O:${price(q.open)} H:${price(q.dayHigh)} L:${price(q.dayLow)} PC:${price(q.previousClose)}\n` : `${s}: — (no data)\n`; });

  o += '\n── DIGITAL ASSET ETFs ──\n';
  DIGITAL_ETFS.forEach(s=>{ const q=Q[s]; o += q ? `${s}: ${price(q.price)} (${pct(q.changesPercentage)}) PC:${price(q.previousClose)}\n` : `${s}: —\n`; });

  o += '\n── BENCHMARKS ──\n';
  BENCHMARKS.forEach(s=>{ const q=Q[s]; o += q ? `${s}: ${price(q.price)} (${pct(q.changesPercentage)}) PC:${price(q.previousClose)}\n` : `${s}: —\n`; });

  const allH=[...DIVIDEND,...GROWTH,...DIGITAL_ETFS];
  const hq=allH.map(s=>({s,q:Q[s]})).filter(x=>x.q).sort((a,b)=>(b.q.changesPercentage||0)-(a.q.changesPercentage||0));
  o += '\n── TOP 5 IOWN MOVERS ──\n';
  hq.slice(0,5).forEach(({s,q})=>{ o+=`${s}: ${pct(q.changesPercentage)} (${price(q.price)})\n`; });
  o += '\n── BOTTOM 5 IOWN MOVERS ──\n';
  hq.slice(-5).reverse().forEach(({s,q})=>{ o+=`${s}: ${pct(q.changesPercentage)} (${price(q.price)})\n`; });

  if(DATA.news&&DATA.news.length){ o+='\n── HEADLINES ──\n'; DATA.news.forEach(n=>{ o+=`• ${n.headline} (${n.source})\n`; }); }

  o += '\n=== END DATA DROP ===\n';
  document.getElementById('outputBox').textContent = o;
  document.getElementById('outputWrap').classList.add('visible');
  document.getElementById('copyBtn').style.display = 'inline-block';
}

function buildDashboard() {
  const Q = DATA.quotes, el = document.getElementById('dashboard');
  let h = '<div class="section-title">Indices</div><div class="cards">';
  INDEX_PROXIES.forEach(s=>{ const q=Q[s]; if(!q)return; const c=q.changesPercentage>=0?'up':'down'; h+=`<div class="card"><div class="card-label">${INDEX_NAMES[s]}</div><div class="card-value">${price(q.price)}</div><div class="card-change ${c}">${pct(q.changesPercentage)}</div></div>`; });
  h += '</div><div class="section-title">Commodities & Rates</div><div class="cards">';
  [...COMMODITY_PROXIES,...RATE_PROXIES].forEach(s=>{ const q=Q[s]; if(!q)return; const c=q.changesPercentage>=0?'up':'down'; const nm=COMMODITY_NAMES[s]||(s==='TLT'?'20Y Bond':s); h+=`<div class="card"><div class="card-label">${nm}</div><div class="card-value">${price(q.price)}</div><div class="card-change ${c}">${pct(q.changesPercentage)}</div></div>`; });
  h += '</div>';
  if(DATA.crypto.bitcoin||DATA.crypto.ethereum){
    h+='<div class="section-title">Crypto & Sentiment</div><div class="cards">';
    ['bitcoin','ethereum'].forEach(id=>{ const c=DATA.crypto[id]; if(!c)return; const cl=c.price_change_percentage_24h>=0?'up':'down'; h+=`<div class="card"><div class="card-label">${c.symbol.toUpperCase()}</div><div class="card-value">${price(c.current_price)}</div><div class="card-change ${cl}">${pct(c.price_change_percentage_24h)} 24h</div></div>`; });
    if(DATA.fearGreed){ const v=parseInt(DATA.fearGreed.value); const cl=v<30?'down':v>60?'up':'flat'; h+=`<div class="card"><div class="card-label">Fear & Greed</div><div class="card-value">${DATA.fearGreed.value}</div><div class="card-change ${cl}">${DATA.fearGreed.value_classification}</div></div>`; }
    h+='</div>';
  }
  h+='<div class="section-title">Sectors</div><div class="cards">';
  SECTOR_ETFS.map(s=>({s,q:Q[s]})).filter(x=>x.q).sort((a,b)=>(b.q.changesPercentage||0)-(a.q.changesPercentage||0)).forEach(({s,q})=>{ const c=q.changesPercentage>=0?'up':'down'; h+=`<div class="card"><div class="card-label">${SECTOR_NAMES[s]}</div><div class="card-value">${pct(q.changesPercentage)}</div><div class="card-change ${c}">${price(q.price)}</div></div>`; });
  h+='</div>';
  const allH=[...DIVIDEND,...GROWTH,...DIGITAL_ETFS];
  const hq=allH.map(s=>({s,q:Q[s]})).filter(x=>x.q).sort((a,b)=>(b.q.changesPercentage||0)-(a.q.changesPercentage||0));
  if(hq.length){
    h+='<div class="section-title">Top 5 Holdings</div><div class="cards">';
    hq.slice(0,5).forEach(({s,q})=>{ h+=`<div class="card"><div class="card-label">${s}</div><div class="card-value up">${pct(q.changesPercentage)}</div><div class="card-change">${price(q.price)}</div></div>`; });
    h+='</div><div class="section-title">Bottom 5 Holdings</div><div class="cards">';
    hq.slice(-5).reverse().forEach(({s,q})=>{ h+=`<div class="card"><div class="card-label">${s}</div><div class="card-value down">${pct(q.changesPercentage)}</div><div class="card-change">${price(q.price)}</div></div>`; });
    h+='</div>';
  }
  el.innerHTML = h; el.classList.add('visible');
}

async function copyOutput() {
  const text = document.getElementById('outputBox').textContent;
  try { await navigator.clipboard.writeText(text); } catch(e) { const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); }
  const toast = document.getElementById('toast'); toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'), 2000);
}

loadKey();
</script>
