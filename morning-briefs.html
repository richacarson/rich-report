<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IOWN Morning Briefs</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --olive-deep: #2C3321;
    --olive-hero: #3D4432;
    --olive-nav: #4A5240;
    --olive-accent: #6B7F4E;
    --olive-light: #B0BF9A;
    --parchment: #EDE9D5;
    --parchment-dark: #E4E0CC;
    --parchment-light: #F5F2E6;
    --text: #2A2A2A;
    --text-light: #5A5A52;
    --muted: #8A8E7A;
    --muted-light: #C8C4B0;
    --accent-red: #8B3A3A;
    --accent-red-light: #A54E4E;
    --rule: #C5C1AD;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'EB Garamond', Garamond, 'Times New Roman', serif; background: var(--olive-deep); color: var(--text); -webkit-font-smoothing: antialiased; }

  /* ══════ GATE ══════ */
  .gate { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--olive-deep); }
  .gate.hidden { display: none; }
  .gate-box { background: var(--olive-hero); padding: 3rem 2.5rem; max-width: 380px; width: 100%; text-align: center; }
  .gate-mark { width: 48px; height: 3px; background: var(--olive-light); margin: 0 auto 1.5rem; }
  .gate-title { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 1.6rem; color: var(--parchment); letter-spacing: 0.04em; margin-bottom: 0.2rem; }
  .gate-sub { font-family: 'DM Sans', sans-serif; font-size: 9px; color: var(--muted-light); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 2rem; }
  .gate-input { width: 100%; font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 10px 12px; border: 1px solid var(--olive-accent); background: rgba(255,255,255,0.06); color: var(--parchment); outline: none; text-align: center; letter-spacing: 2px; margin-bottom: 10px; }
  .gate-input::placeholder { color: var(--muted); }
  .gate-input:focus { border-color: var(--olive-light); }
  .gate-input.error { border-color: var(--accent-red); animation: shake 0.3s; }
  .gate-btn { font-family: 'DM Sans', sans-serif; font-size: 10px; padding: 10px 2rem; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; background: var(--olive-accent); color: var(--parchment); width: 100%; transition: background 0.15s; }
  .gate-btn:hover { background: var(--olive-light); color: var(--olive-deep); }
  .gate-error { font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--accent-red-light); margin-top: 8px; min-height: 1rem; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

  /* ══════ APP ══════ */
  .app { display: none; }
  .app.visible { display: block; }

  /* ── Top Bar ── */
  .top-bar {
    background: var(--olive-deep); padding: 8px 24px; display: flex;
    justify-content: space-between; align-items: center;
    font-family: 'DM Sans', sans-serif; font-size: 9px; color: var(--muted);
    letter-spacing: 1.5px; text-transform: uppercase;
  }
  .top-bar a { color: var(--muted); text-decoration: none; }
  .top-bar a:hover { color: var(--muted-light); }

  /* ── Hero ── */
  .hero-section {
    background: var(--olive-hero); text-align: center;
    padding: 30px 20px 10px;
  }
  .hero-logo { font-family: 'Playfair Display', serif; color: var(--olive-light); margin-bottom: 4px; }
  .hero-logo .the { font-size: 18px; font-weight: 400; letter-spacing: 2px; display: block; margin-bottom: -12px; }
  .hero-logo .morning { font-size: 52px; font-weight: 900; line-height: 1; letter-spacing: -1px; }
  .hero-logo .brief { font-size: 62px; font-weight: 900; font-style: italic; line-height: 0.85; letter-spacing: -1px; }
  .hero-sub {
    font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--muted-light);
    letter-spacing: 3px; text-transform: uppercase; margin-top: 14px;
  }

  /* ── Date Bar ── */
  .date-bar {
    background: var(--olive-hero); text-align: center; padding: 10px 20px 12px;
    font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--muted-light);
    letter-spacing: 2px; text-transform: uppercase;
  }

  /* ── Sticky Nav ── */
  .sticky-nav {
    background: var(--olive-nav); position: sticky; top: 0; z-index: 100;
    text-align: center; padding: 10px 16px; display: flex; flex-wrap: wrap;
    justify-content: center; gap: 6px 20px;
  }
  .sticky-nav a {
    font-family: 'DM Sans', sans-serif; font-size: 9px; color: var(--muted-light);
    text-decoration: none; letter-spacing: 1.5px; text-transform: uppercase;
    padding: 2px 0; transition: color 0.15s; white-space: nowrap;
  }
  .sticky-nav a:hover { color: #fff; }
  .sticky-nav a.active { color: #fff; border-bottom: 1px solid var(--olive-light); }
  .sticky-nav a.nav-dl { border: 1px solid var(--muted); padding: 2px 8px; border-radius: 2px; }
  .sticky-nav a.nav-dl:hover { border-color: var(--muted-light); color: #fff; }

  /* ── Content Wrapper (green sidebar stripe) ── */
  .content-wrap { display: flex; max-width: 1000px; margin: 0 auto; }
  .green-sidebar { width: 24px; background: var(--olive-light); flex-shrink: 0; }
  .content-body { flex: 1; background: var(--parchment); padding: 28px 24px 40px; min-height: 60vh; }

  /* ── Archive Drawer ── */
  .archive-toggle {
    display: none; background: var(--parchment-dark); padding: 10px 24px;
    border-bottom: 1px solid var(--rule); cursor: pointer; text-align: center;
    font-family: 'DM Sans', sans-serif; font-size: 10px; color: var(--muted);
    letter-spacing: 1.5px; text-transform: uppercase; transition: background 0.15s;
  }
  .archive-toggle:hover { background: var(--rule); }
  .archive-drawer {
    background: var(--parchment-dark); border-bottom: 2px solid var(--olive-accent);
    max-height: 0; overflow: hidden; transition: max-height 0.3s ease;
  }
  .archive-drawer.open { max-height: 800px; }
  .archive-list { display: flex; flex-wrap: wrap; gap: 0; padding: 0; }
  .archive-item {
    flex: 1; min-width: 200px; padding: 12px 18px; cursor: pointer;
    border-bottom: 1px solid var(--rule); border-right: 1px solid var(--rule);
    transition: background 0.12s;
  }
  .archive-item:hover { background: var(--parchment); }
  .archive-item.active { background: var(--parchment); box-shadow: inset 0 -3px 0 var(--olive-accent); }
  .archive-item.active.dn { box-shadow: inset 0 -3px 0 var(--accent-red); }
  .archive-date {
    font-family: 'DM Sans', sans-serif; font-size: 9px; color: var(--muted);
    letter-spacing: 1px; text-transform: uppercase;
  }
  .archive-hl { font-family: 'EB Garamond', serif; font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .archive-hl.up { color: var(--olive-accent); }
  .archive-hl.down { color: var(--accent-red); }
  .archive-stats {
    display: flex; gap: 16px; padding: 10px 18px; border-bottom: 1px solid var(--rule);
    font-family: 'DM Sans', sans-serif; font-size: 10px; color: var(--muted);
    letter-spacing: 1px; text-transform: uppercase;
  }
  .archive-stats span { font-family: 'EB Garamond', serif; font-size: 18px; font-weight: 700; }

  /* ══════ BRIEF CONTENT STYLES ══════ */

  /* Section label (SECTION 01) */
  .bc .section-label {
    font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--muted);
    letter-spacing: 2px; text-transform: uppercase; margin-top: 32px;
  }
  .bc .section-label:first-child { margin-top: 0; }

  /* Section h2 */
  .bc h2 {
    font-family: 'EB Garamond', Garamond, serif; font-size: 24px; font-weight: 700;
    color: var(--text); margin: 4px 0 6px; line-height: 1.2;
  }

  /* Section rule */
  .bc .section-rule { height: 3px; background: var(--olive-accent); margin-bottom: 14px; }

  /* Bullet / insight cards */
  .bc .bullet {
    padding: 14px 0 14px 20px; margin: 0 0 16px 8px;
    border-left: 3px solid var(--olive-accent);
  }
  .bc .bullet-heading {
    font-family: 'EB Garamond', serif; font-size: 17px; font-weight: 700;
    color: var(--text); margin-bottom: 6px;
  }
  .bc .bullet-body {
    font-family: 'EB Garamond', serif; font-size: 16px; line-height: 1.65;
    color: var(--text-light);
  }
  .bc .bullet-body b, .bc .bullet-body strong { color: var(--text); }

  /* Regular paragraphs */
  .bc p {
    font-family: 'EB Garamond', serif; font-size: 16px; line-height: 1.65;
    margin-bottom: 12px; color: var(--text-light);
  }
  .bc p b, .bc p strong { color: var(--text); }

  /* Lead text */
  .bc .lead { font-size: 17px; font-weight: 500; color: var(--text); line-height: 1.6; }

  /* Pullquote / Tactical */
  .bc .pullquote {
    position: relative; margin: 18px 0 18px 8px; padding: 14px 0 14px 20px;
    border-left: 3px solid var(--olive-accent); font-style: italic;
    color: var(--olive-accent); font-size: 16px; line-height: 1.6;
    background: rgba(176,191,154,0.08);
  }
  .bc .pullquote::before {
    content: 'IOWN TACTICAL'; position: absolute; top: -8px; left: 20px;
    font-family: 'DM Sans', sans-serif; font-size: 8px; font-style: normal;
    font-weight: 600; letter-spacing: 1.5px; color: var(--olive-light);
    background: var(--parchment); padding: 0 6px;
  }
  .bc .pullquote b, .bc .pullquote strong { font-style: normal; color: var(--olive-accent); }

  /* Data box */
  .bc .data-box {
    background: var(--parchment-dark); padding: 14px 18px; margin: 14px 0 14px 8px;
    border-left: 3px solid var(--olive-accent);
    font-family: 'DM Sans', sans-serif; font-size: 12px; line-height: 1.8; color: var(--text-light);
  }
  .bc .data-box .data-row { display: flex; justify-content: space-between; padding: 2px 0; border-bottom: 1px dotted var(--rule); }
  .bc .data-box .data-row:last-child { border-bottom: none; }
  .bc .data-box .data-label { color: var(--muted); font-size: 11px; }
  .bc .data-box .data-val { font-weight: 600; }
  .bc .up { color: var(--olive-accent); }
  .bc .dn { color: var(--accent-red); }

  /* Tables */
  .bc table { width: 100%; border-collapse: collapse; margin: 14px 0; }
  .bc thead { border-bottom: 2px solid var(--text); }
  .bc th {
    font-family: 'DM Sans', sans-serif; font-size: 9px; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--muted); text-align: left; padding: 6px 8px; font-weight: 500;
  }
  .bc td {
    font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 7px 8px;
    border-bottom: 1px solid var(--rule); color: var(--text-light);
  }
  .bc td:first-child { font-weight: 700; color: var(--text); font-family: 'EB Garamond', serif; font-size: 15px; }

  /* Radar items */
  .bc .radar-item {
    padding: 14px 0 14px 20px; margin: 0 0 16px 8px;
    border-left: 3px solid var(--olive-accent);
    font-size: 15px; line-height: 1.6; color: var(--text-light);
  }
  .bc .radar-item b:first-child, .bc .radar-item strong:first-child { color: var(--text); font-size: 16px; }

  /* Snapshot bar */
  .bc .snapshot {
    display: flex; flex-wrap: wrap; background: var(--olive-deep); color: var(--parchment);
    font-family: 'DM Sans', sans-serif; margin: -28px -24px 24px;
  }
  .bc .snap-item {
    flex: 1; min-width: 110px; padding: 10px 14px;
    border-right: 1px solid rgba(255,255,255,0.08);
  }
  .bc .snap-item:last-child { border-right: none; }
  .bc .snap-label { font-size: 8px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
  .bc .snap-val { font-size: 13px; font-weight: 600; color: var(--parchment); margin-top: 2px; }
  .bc .snap-val.up { color: #9FCB8A; }
  .bc .snap-val.dn { color: #E07B6F; }

  /* ── Disclaimer ── */
  .brief-disc {
    background: var(--parchment-dark); margin: 0 -24px -40px; padding: 20px 24px;
    font-family: 'DM Sans', sans-serif; font-size: 11px; color: #777;
    line-height: 1.6;
  }

  /* ── Footer ── */
  .app-footer {
    background: var(--olive-deep); padding: 20px 40px; text-align: center;
    font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--muted);
    letter-spacing: 1px;
  }
  .app-footer a { color: var(--muted-light); text-decoration: none; }

  /* ── Floating PDF Button ── */
  .pdf-float {
    position: fixed; bottom: 20px; right: 20px; z-index: 200;
    background: var(--olive-hero); color: var(--parchment); padding: 10px 16px;
    font-family: 'DM Sans', sans-serif; font-size: 12px; letter-spacing: 0.5px;
    text-decoration: none; display: flex; align-items: center; gap: 6px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3); transition: background 0.15s;
  }
  .pdf-float:hover { background: var(--olive-accent); }
  .pdf-float svg { width: 14px; height: 14px; }

  .brief-loading {
    font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--muted);
    text-align: center; padding: 60px 0;
  }

  /* ══════ MOBILE ══════ */
  @media (max-width: 700px) {
    .green-sidebar { width: 12px; }
    .content-body { padding: 20px 16px 30px; }
    .hero-logo .morning { font-size: 36px; }
    .hero-logo .brief { font-size: 44px; }
    .bc .snapshot { margin: -20px -16px 20px; }
    .bc .snap-item { min-width: 80px; padding: 8px 10px; }
    .bc h2 { font-size: 20px; }
    .bc .bullet, .bc .pullquote, .bc .radar-item, .bc .data-box { margin-left: 0; }
    .archive-item { min-width: 150px; }
    .brief-disc { margin: 0 -16px -30px; padding: 16px; }
    .pdf-float { bottom: 12px; right: 12px; padding: 8px 12px; font-size: 11px; }
  }
</style>
</head>
<body>

<!-- ══════ GATE ══════ -->
<div class="gate" id="gate">
  <div class="gate-box">
    <div class="gate-mark"></div>
    <div class="gate-title">Morning Briefs</div>
    <div class="gate-sub">Intentional Ownership · Investment Committee</div>
    <input type="password" class="gate-input" id="gatePass" placeholder="Enter password" autofocus />
    <button class="gate-btn" onclick="tryAuth()">Enter</button>
    <div class="gate-error" id="gateError"></div>
  </div>
</div>

<!-- ══════ APP ══════ -->
<div class="app" id="app">

  <div class="top-bar">
    <span class="top-bar-logo">IOWN</span>
    <a href="https://intentionalownership.com">INTENTIONALOWNERSHIP.COM</a>
    <span>(985) 727-0770</span>
  </div>

  <div class="hero-section">
    <div class="hero-logo">
      <span class="the">The</span>
      <span class="morning">Morning</span><br>
      <span class="brief">Brief</span>
    </div>
    <div class="hero-sub">Daily Intelligence for the Investment Committee</div>
  </div>

  <div class="date-bar" id="dateBar">LOADING...</div>

  <div class="sticky-nav" id="stickyNav"></div>

  <div class="archive-toggle" id="archiveToggle" onclick="toggleArchive()">▾ ARCHIVE (<span id="archiveCount">0</span> BRIEFS)</div>

  <div class="archive-drawer" id="archiveDrawer">
    <div class="archive-stats" id="archiveStats"></div>
    <div class="archive-list" id="archiveList"></div>
  </div>

  <div class="content-wrap">
    <div class="green-sidebar"></div>
    <div class="content-body bc" id="briefBody">
      <div class="brief-loading">Loading&hellip;</div>
    </div>
  </div>

  <div class="app-footer">
    <a href="https://intentionalownership.com">www.intentionalownership.com</a> &nbsp;·&nbsp; Research Reveals Opportunities
  </div>

  <a class="pdf-float" id="pdfFloat" href="#" download style="display:none">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Download PDF
  </a>
</div>

<script>
/* ══════ AUTH ══════ */
const HASH = '1163a0013453d999380b32225cdcaa183f5d3f675d55a18872c4bbafdc0fd36c';
async function sha256(s) { const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s)); return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join(''); }
async function tryAuth() {
  const inp = document.getElementById('gatePass'), err = document.getElementById('gateError');
  if (await sha256(inp.value) === HASH) { localStorage.setItem('iown_ba', HASH); unlock(); }
  else { inp.classList.add('error'); err.textContent = 'Incorrect password'; setTimeout(() => { inp.classList.remove('error'); err.textContent = ''; }, 1500); }
}
function unlock() { document.getElementById('gate').classList.add('hidden'); document.getElementById('app').classList.add('visible'); init(); }
document.getElementById('gatePass').addEventListener('keydown', e => { if (e.key === 'Enter') tryAuth(); });
(async () => { if (localStorage.getItem('iown_ba') === HASH) unlock(); })();

/* ══════ APP ══════ */
let BRIEFS = [], active = null, archiveOpen = false;

// Section IDs for nav (matched in content HTML)
const SECTIONS = [
  { id: 'markets', label: 'Markets' },
  { id: 'holdings', label: 'Holdings' },
  { id: 'digital', label: 'Digital Assets' },
  { id: 'geopolitics', label: 'Geopolitics' },
  { id: 'radar', label: 'On Our Radar' }
];

async function init() {
  try {
    const r = await fetch('briefs/manifest.json');
    if (!r.ok) throw new Error();
    BRIEFS = await r.json();
    BRIEFS.sort((a, b) => new Date(b.date) - new Date(a.date));
    document.getElementById('archiveToggle').style.display = 'block';
    document.getElementById('archiveCount').textContent = BRIEFS.length;
    renderArchive();
    renderNav();
    if (BRIEFS.length) selectBrief(BRIEFS[0].date);
  } catch(e) {
    document.getElementById('briefBody').innerHTML = '<div class="brief-loading">Could not load manifest.</div>';
  }
}

function renderNav() {
  const nav = document.getElementById('stickyNav');
  nav.innerHTML = SECTIONS.map(s =>
    `<a href="#${s.id}" onclick="smoothScroll('${s.id}');return false;">${s.label}</a>`
  ).join('') + `<a href="#" id="navDl" class="nav-dl" onclick="return false;">↓ DOWNLOAD PDF</a>`;
}

function renderArchive() {
  const up = BRIEFS.filter(b => b.direction === 'up').length;
  const dn = BRIEFS.filter(b => b.direction === 'down').length;
  document.getElementById('archiveStats').innerHTML =
    `BRIEFS <span>${BRIEFS.length}</span> &nbsp;&nbsp; GREEN <span style="color:var(--olive-accent)">${up}</span> &nbsp;&nbsp; RED <span style="color:var(--accent-red)">${dn}</span>`;

  document.getElementById('archiveList').innerHTML = BRIEFS.map(b => {
    const d = new Date(b.date + 'T12:00:00');
    const s = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const dir = b.direction || 'flat';
    return `<div class="archive-item" data-d="${b.date}" onclick="selectBrief('${b.date}')">
      <div class="archive-date">${s}</div>
      <div class="archive-hl ${dir}">${b.headline}</div>
    </div>`;
  }).join('');
}

function toggleArchive() {
  archiveOpen = !archiveOpen;
  document.getElementById('archiveDrawer').classList.toggle('open', archiveOpen);
  document.getElementById('archiveToggle').innerHTML =
    `${archiveOpen ? '▴' : '▾'} ARCHIVE (<span id="archiveCount">${BRIEFS.length}</span> BRIEFS)`;
}

async function selectBrief(date) {
  active = BRIEFS.find(b => b.date === date);
  if (!active) return;

  // Close archive
  archiveOpen = false;
  document.getElementById('archiveDrawer').classList.remove('open');
  document.getElementById('archiveToggle').innerHTML =
    `▾ ARCHIVE (<span id="archiveCount">${BRIEFS.length}</span> BRIEFS)`;

  // Update active states
  document.querySelectorAll('.archive-item').forEach(el => {
    el.classList.remove('active', 'dn');
    if (el.dataset.d === date) { el.classList.add('active'); if (active.direction === 'down') el.classList.add('dn'); }
  });

  // Update date bar
  const d = new Date(date + 'T12:00:00');
  document.getElementById('dateBar').textContent =
    d.toLocaleDateString('en-US', { month: 'long', day: '2-digit', year: 'numeric' }).toUpperCase();

  // PDF float
  const pdf = active.pdf || active.filename;
  const pdfEl = document.getElementById('pdfFloat');
  const navDl = document.getElementById('navDl');
  if (pdf) {
    const pp = 'briefs/' + pdf;
    pdfEl.href = pp; pdfEl.style.display = 'flex';
    if (navDl) { navDl.href = pp; navDl.setAttribute('download', ''); navDl.onclick = null; }
  } else {
    pdfEl.style.display = 'none';
  }

  // Load HTML content
  const cf = active.content || date + '.html';
  const body = document.getElementById('briefBody');
  body.innerHTML = '<div class="brief-loading">Loading brief&hellip;</div>';

  try {
    const r = await fetch('briefs/' + cf);
    if (!r.ok) throw new Error();
    const html = await r.text();
    body.innerHTML = html +
      `<div class="brief-disc">Paradiem, LLC dba Intentional Ownership ("IOWN") is a registered investment advisor. Advisory services are only offered to clients or prospective clients where Paradiem/IOWN and its representatives are properly licensed or exempt from licensure. The information provided is for educational and informational purposes only and does not constitute investment advice and it should not be relied on as such. It should not be considered a solicitation to buy or an offer to sell a security.</div>`;
  } catch(e) {
    const pp = pdf ? 'briefs/' + pdf : null;
    body.innerHTML = `<div class="brief-loading">HTML version not yet available.${pp ? `<br><br><a class="pdf-float" href="${pp}" target="_blank" style="position:static;display:inline-flex;box-shadow:none;">Download PDF</a>` : ''}</div>`;
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function smoothScroll(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
